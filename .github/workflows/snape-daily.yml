name: Snape Daily Monitor (Quality + Health Watch)

on:
  schedule:
    - cron: '13,43 22,23 * * *'
    - cron: '13,43 0,1,2,3 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '監視モード: health / quality / full'
        required: false
        default: 'full'

permissions:
  issues: write
  contents: read

jobs:
  snape-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore auth key file
        env:
          HOG_ACCESS_KEY: ${{ secrets.HOG_ACCESS_KEY }}
        run: |
          mkdir -p operation/auth
          printf '%s' "$HOG_ACCESS_KEY" | tr -d '\r' > operation/auth/access_HOG-2026-05.key

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd scripts
          pip install -r requirements.txt

      - name: Run Snape Daily Monitor
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:         ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python scripts/snape_daily.py --mode ${{ github.event.inputs.mode || 'full' }}
